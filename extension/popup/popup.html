<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 划词翻译</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-inner">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H8l-3 3v-3H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/>
          <path d="M15 3h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-2v2.5L16.5 10H15a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
          <path d="M7 15l1.5 2M10.5 15L9 17"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>AI 划词翻译</h1>
        <p class="brand-sub">选中任意文本，一键译为目标语言</p>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="auth-section">
      <div id="login-form" class="card">
        <div class="card-head">
          <span class="card-title">账号</span>
          <span class="card-tag">未登录</span>
        </div>
        <label>用户名
          <input type="text" id="username" autocomplete="username" placeholder="3 ~ 64 位" />
        </label>
        <label>密码
          <input type="password" id="password" autocomplete="current-password" placeholder="至少 6 位" />
        </label>
        <p id="auth-error" class="error hidden"></p>
        <div class="btn-row">
          <button id="btn-login" class="btn primary full">登录</button>
          <button id="btn-register" class="btn secondary">注册</button>
        </div>
      </div>

      <div id="user-panel" class="card user-card hidden">
        <div class="user-info">
          <div class="avatar" id="user-avatar"></div>
          <div class="user-meta">
            <div class="user-label">已登录账号</div>
            <div class="user-name" id="display-username"></div>
          </div>
          <button id="btn-logout" class="icon-btn-ghost" title="退出登录" aria-label="退出登录">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">翻译设置</span>
      </div>
      <label>目标语言
        <select id="target-lang">
          <option value="zh">🇨🇳 中文</option>
          <option value="en">🇬🇧 英文</option>
          <option value="ja">🇯🇵 日文</option>
          <option value="ko">🇰🇷 韩文</option>
          <option value="fr">🇫🇷 法文</option>
          <option value="de">🇩🇪 德文</option>
          <option value="es">🇪🇸 西班牙文</option>
        </select>
      </label>
      <label>API 地址
        <input type="text" id="api-base" placeholder="http://localhost:8000" />
      </label>
      <button id="btn-save-api" class="btn secondary full">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>保存设置</span>
      </button>
    </div>

    <div id="history-section" class="card history-card hidden">
      <div class="card-head">
        <span class="card-title">翻译历史</span>
      </div>
      <p class="hint">在独立看板中管理记录，支持搜索 / 标记 / 编辑 / 收藏。</p>
      <button id="btn-open-history" class="btn primary full">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
        </svg>
        <span>打开历史看板</span>
      </button>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="popup.js"></script>
</body>
</html>
