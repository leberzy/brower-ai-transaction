<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>翻译历史看板 · AI 划词翻译</title>
  <link rel="stylesheet" href="history.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H8l-3 3v-3H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/>
          <path d="M15 3h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-2v2.5L16.5 10H15a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
          <path d="M7 15l1.5 2M10.5 15L9 17"/>
        </svg>
      </div>
      <div class="topbar-titles">
        <h1>翻译历史看板</h1>
        <p class="topbar-sub">AI 划词翻译 · 个人记录管理</p>
      </div>
      <span id="user-badge" class="badge hidden"></span>
    </div>
    <div class="topbar-actions">
      <button id="btn-refresh" class="btn secondary" title="刷新列表 (R)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 3 21 9 15 9"/></svg>
        <span>刷新</span>
      </button>
      <button id="btn-create" class="btn primary" title="新建记录 (N)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <span>新建记录</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div id="login-prompt" class="empty-state hidden">
      <div class="empty-illust">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </div>
      <h2>请先登录插件</h2>
      <p>登录后才能查看与管理你的翻译历史</p>
      <button id="btn-go-login" class="btn primary">打开插件登录</button>
    </div>

    <div id="board" class="board hidden">
      <div class="board-tabs">
        <button type="button" class="tab-btn is-active" data-tab="all">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          <span>全部记录</span>
        </button>
        <button type="button" class="tab-btn" data-tab="pending">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>待学</span>
          <span id="pending-count" class="tab-count">0</span>
        </button>
      </div>
      <div class="toolbar toolbar-main">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="search-input" placeholder="搜索原文或译文…" />
        </div>
        <span id="record-count" class="count"></span>
      </div>
      <div class="toolbar toolbar-date">
        <label class="date-field">
          开始
          <input type="date" id="date-start" />
        </label>
        <span class="date-sep">至</span>
        <label class="date-field">
          结束
          <input type="date" id="date-end" />
        </label>
        <button id="btn-filter-date" class="btn secondary sm">按时间筛选</button>
        <button id="btn-clear-date" class="btn ghost sm">清除时间</button>
      </div>
      <div id="toolbar-status" class="toolbar toolbar-status">
        <span class="filter-label">状态</span>
        <button type="button" id="filter-learned" class="filter-chip" data-filter="learned">
          <span class="chip-dot chip-dot-learned"></span>已学会
        </button>
        <button type="button" id="filter-favorited" class="filter-chip" data-filter="favorited">
          <span class="chip-dot chip-dot-fav"></span>收藏
        </button>
        <button type="button" id="btn-clear-status" class="btn ghost sm">清除筛选</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-time">时间</th>
              <th class="col-source">原文</th>
              <th class="col-target">
                <div class="th-target">
                  <span>译文</span>
                  <button type="button" id="toggle-all-visible" class="eye-btn" title="全部显示/隐藏译文"></button>
                </div>
              </th>
              <th class="col-status">状态</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>

      <div id="empty-tip" class="empty-tip hidden">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
        <p id="empty-tip-text">暂无记录，点击「新建记录」添加</p>
      </div>
      <button id="btn-load-more" class="btn secondary load-more hidden">加载更多</button>
    </div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">新建记录</h2>
        <button id="modal-close" class="icon-btn" title="关闭 (Esc)" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="record-form">
        <input type="hidden" id="record-id" />
        <label>
          原文
          <textarea id="source-text" rows="4" required placeholder="输入要翻译的原文…"></textarea>
        </label>
        <label>
          译文
          <textarea id="translated-text" rows="4" required placeholder="输入对应的译文…"></textarea>
        </label>
        <p id="form-error" class="error hidden"></p>
        <div class="modal-footer">
          <span class="modal-hint">⌘/Ctrl + Enter 快速保存</span>
          <div class="modal-footer-actions">
            <button type="button" id="btn-cancel" class="btn secondary">取消</button>
            <button type="submit" id="btn-save" class="btn primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="view-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card modal-view">
      <div class="modal-header">
        <h2>记录详情</h2>
        <button id="view-close" class="icon-btn" title="关闭 (Esc)" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="view-body">
        <div class="view-meta" id="view-meta"></div>
        <div class="view-block">
          <div class="view-label">原文</div>
          <div id="view-source" class="view-content"></div>
        </div>
        <div class="view-block">
          <div class="view-label">译文</div>
          <div id="view-target" class="view-content view-target"></div>
        </div>
        <!-- 例句区域：仅单词时显示 -->
        <div id="view-examples-section" class="view-block view-examples-section hidden">
          <div class="view-examples-header">
            <div class="view-label">例句</div>
            <button id="view-examples-btn" class="btn secondary sm" type="button">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              <span>生成例句</span>
            </button>
          </div>
          <div id="view-examples-wrap" class="view-examples-wrap"></div>
        </div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-actions">
          <button type="button" id="view-edit" class="btn secondary">编辑</button>
          <button type="button" id="view-delete" class="btn danger">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="history.js"></script>
</body>
</html>
